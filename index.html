<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendTiers - Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 FriendTiers</h1>
            <p>Offizielle Rangliste</p>
        </header>

        <div class="main-content">
            <div class="controls">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="Spieler hinzufügen...">
                    <select id="tierSelect">
                        <option value="HT1">HT1</option>
                        <option value="LT1">LT1</option>
                        <option value="HT2">HT2</option>
                        <option value="LT2">LT2</option>
                        <option value="HT3">HT3</option>
                        <option value="LT3">LT3</option>
                        <option value="HT4">HT4</option>
                        <option value="LT4">LT4</option>
                        <option value="HT5">HT5</option>
                        <option value="LT5">LT5</option>
                    </select>
                    <button onclick="addPlayer()">➕ Hinzufügen</button>
                </div>
                <button class="clear-btn" onclick="clearAll()">🗑️ Alles löschen</button>
            </div>

            <div class="rankings-section">
                <h2>📊 Gesamtrankings</h2>
                <table class="rankings-table">
                    <thead>
                        <tr>
                            <th class="rank-col">Rang</th>
                            <th class="name-col">Spieler</th>
                            <th class="tier-col">Tier</th>
                            <th class="actions-col">Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="rankingsBody">
                        <!-- Dynamisch gefüllt -->
                    </tbody>
                </table>
            </div>

            <div class="unranked-section">
                <h3>📋 Nicht eingeordnet</h3>
                <div class="unranked-list" id="unrankedList">
                    <!-- Dynamisch gefüllt -->
                </div>
            </div>
        </div>

        <footer>
            <p>FriendTiers Rankings System | Made with ❤️</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
